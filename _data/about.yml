bio_1: "I'm a <span class=\"hl-strong\">microbial ecologist</span> fascinated by how life thrives in extreme environments — particularly <span class=\"hl\">deep-sea hydrothermal vents</span>. My research integrates omics, chemistry, and modeling to understand how microbes influence the cycling of <span class=\"hl\">iron, sulfur, and trace elements</span> in hydrothermal plumes."
bio_2: "Beyond research, I enjoy coding, designing games, and cooking — exploring creativity across both science and art."
