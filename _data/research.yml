intro_1: "My research focuses on the <span class=\"hl-strong\">microbial ecology and biogeochemistry</span> of deep-sea hydrothermal systems, combining <span class=\"hl\">multi-omics</span> and <span class=\"hl\">geochemical modeling</span> to understand how microbes influence the cycling of iron, sulfur, and trace elements in hydrothermal plumes."
intro_2: "Throughout my academic journey, I've had the privilege of working with many inspiring researchers — some of whom became close friends and remarkable collaborators — leading to several exciting scientific partnerships, some of which are listed below."
